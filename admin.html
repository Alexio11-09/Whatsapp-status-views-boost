<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Alpha VCFS – Admin</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0b0f0b;color:#d0d0d0;font-family:'Inter',system-ui,sans-serif;padding:20px}
    .container{max-width:800px;margin:0 auto}
    .card{background:#121812;border:1px solid #1f2a1f;border-radius:12px;padding:20px;margin-bottom:20px}
    h2,h3{color:#fff;margin-bottom:15px}
    input,button{width:100%;padding:12px;margin:8px 0;background:#0a0f0a;border:1px solid #1f2a1f;color:#fff;border-radius:8px;font-size:0.95rem}
    button{background:#4ade80;color:#000;font-weight:600;cursor:pointer} button:hover{filter:brightness(1.1)}
    .hidden{display:none!important}
    .warn{color:#f0f;font-size:0.85rem}
    table{width:100%;border-collapse:collapse;margin-top:15px}
    th,td{padding:10px;text-align:left;border-bottom:1px solid #1f2a1f;font-size:0.9rem}
    th{color:#4ade80}
    .btn-sm{padding:6px 10px;font-size:0.8rem;width:auto;background:#4ade80;color:#000;border:none;border-radius:6px;cursor:pointer}
    .btn-del{background:#f0f;color:#fff}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:20px}
    .stat-box{background:#1e2a1e;padding:15px;border-radius:8px;text-align:center}
    .stat-value{font-size:1.8rem;font-weight:700;color:#4ade80}
    .stat-label{font-size:0.7rem;color:#8b9a8b;text-transform:uppercase}
  </style>
</head>
<body>
<div class="container" id="loginContainer">
  <div class="card">
    <h2>Admin Login</h2>
    <input type="email" id="adminEmail" placeholder="Admin email">
    <input type="password" id="adminPassword" placeholder="Password">
    <button onclick="adminLogin()">Login</button>
    <p id="loginMsg" class="warn"></p>
  </div>
</div>

<div class="container hidden" id="adminContainer">
  <div class="card">
    <h2>Admin Dashboard</h2>
    <button onclick="logout()" style="background:#f0f;color:#fff;">Logout</button>
  </div>
  <div class="stats-grid">
    <div class="stat-box"><div class="stat-value" id="totalSessions">0</div><div class="stat-label">Total Sessions</div></div>
    <div class="stat-box"><div class="stat-value" id="totalContacts">0</div><div class="stat-label">Total Contacts</div></div>
    <div class="stat-box"><div class="stat-value" id="totalUsers">0</div><div class="stat-label">Registered Users</div></div>
  </div>
  <div class="card">
    <h3>All Sessions</h3>
    <table id="sessionsTable">
      <thead><tr><th>Name</th><th>Target</th><th>Contacts</th><th>Owner</th><th>Actions</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
import { getDatabase, ref, get, child, remove, onValue } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAQwmSD9lc6A0G-AhGBMCBayhM4Ox-jcEs",
  authDomain: "status-views-boost.firebaseapp.com",
  projectId: "status-views-boost",
  storageBucket: "status-views-boost.firebasestorage.app",
  messagingSenderId: "497892708994",
  appId: "1:497892708994:web:a169130977e576f0915a9b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const ADMIN_EMAIL = "alexiomhungu9@gmail.com";

window.adminLogin = async () => {
  const email = document.getElementById("adminEmail").value;
  const password = document.getElementById("adminPassword").value;
  const msg = document.getElementById("loginMsg");
  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch(e) { msg.textContent = e.message; }
};

window.logout = () => signOut(auth);

onAuthStateChanged(auth, async (user) => {
  if (user && user.email === ADMIN_EMAIL) {
    document.getElementById("loginContainer").classList.add("hidden");
    document.getElementById("adminContainer").classList.remove("hidden");
    loadAdminData();
  } else {
    document.getElementById("loginContainer").classList.remove("hidden");
    document.getElementById("adminContainer").classList.add("hidden");
  }
});

function loadAdminData() {
  const sessionsRef = ref(db, 'sessions');
  onValue(sessionsRef, async (snap) => {
    const sessions = snap.val();
    const tbody = document.querySelector("#sessionsTable tbody");
    tbody.innerHTML = "";
    let totalSessions = 0, totalContacts = 0;
    const userIds = new Set();

    if (sessions) {
      for (const [sessionId, session] of Object.entries(sessions)) {
        totalSessions++;
        if (session.owner) userIds.add(session.owner);
        
        // Get contacts count from Realtime Database
        const contactsRef = ref(db, 'sessions/' + sessionId + '/contacts');
        const contactsSnap = await get(contactsRef);
        const contactCount = contactsSnap.size;
        totalContacts += contactCount;

        const row = tbody.insertRow();
        row.innerHTML = `
          <td>${session.name}</td>
          <td>${session.target}</td>
          <td>${contactCount}</td>
          <td>${session.owner ? session.owner.substring(0,10)+'...' : 'unknown'}</td>
          <td>
            <button class="btn-sm btn-del" onclick="deleteSession('${sessionId}')">Delete</button>
          </td>
        `;
      }
    }

    document.getElementById("totalSessions").textContent = totalSessions;
    document.getElementById("totalContacts").textContent = totalContacts;
    document.getElementById("totalUsers").textContent = userIds.size;
  });
}

window.deleteSession = async (sessionId) => {
  if (confirm("Delete this session and all its contacts?")) {
    await remove(ref(db, 'sessions/' + sessionId));
    alert("Deleted!");
    loadAdminData();
  }
};
</script>
</body>
</html>
